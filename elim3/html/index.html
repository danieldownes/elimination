// ============================================================
// ASSET LOADING

function loadAssets(callback) {
  let loaded = 0;
  const total = imageList.length + soundNames.length;
  function check() { if (++loaded >= total) callback(); }

  imageList.forEach(name => {
    const img = new Image();
    img.onload = check;
    img.onerror = () => { console.warn("Failed to load: " + name + ".png"); check(); };
    img.src = "assets/" + name + ".png";
    images[name] = img;
  });
  soundNames.forEach(name => {
    const audio = new Audio();
    audio.oncanplaythrough = check;
    audio.onerror = () => { console.warn("Failed to load sound: " + name); check(); };
    audio.preload = "auto";
    audio.src = "assets/sounds/" + name + ".wav";
    sounds[name] = audio;
  });
}

function playSound(name) {
  if (!soundOn) return;
  try {
    const s = sounds[name];
    if (!s) return;
    const clone = s.cloneNode();
    clone.volume = s.volume;
    clone.play().catch(()=>{});
  } catch(e) {}
}

// ============================================================
// MIDI MUSIC - soundfont-player with pitch bend & volume support
// ============================================================
let musicOn = true, musicPlaying = false, currentSong = 0;
const MUSIC_COUNT = 10;
let mACtx = null, mGain = null;
let mCh = new Array(16).fill(null); // channel state: {prg, vol, expr, bend, notes:{}}
let mEvents = [], mEvIdx = 0, mStartTime = 0;
let mInterval = null, mNextSongTimeout = null;
let mInstruments = {}; // cache: GM program number → soundfont instrument
let mLoadingInstruments = {}; // loading promises

const GM_NAMES = [
  "acoustic_grand_piano","bright_acoustic_piano","electric_grand_piano","honkytonk_piano",
  "electric_piano_1","electric_piano_2","harpsichord","clavinet",
  "celesta","glockenspiel","music_box","vibraphone",
  "marimba","xylophone","tubular_bells","dulcimer",
  "drawbar_organ","percussive_organ","rock_organ","church_organ",
  "reed_organ","accordion","harmonica","tango_accordion",
  "acoustic_guitar_nylon","acoustic_guitar_steel","electric_guitar_jazz","electric_guitar_clean",
  "electric_guitar_muted","overdriven_guitar","distortion_guitar","guitar_harmonics",
  "acoustic_bass","electric_bass_finger","electric_bass_pick","fretless_bass",
  "slap_bass_1","slap_bass_2","synth_bass_1","synth_bass_2",
  "violin","viola","cello","contrabass",
  "tremolo_strings","pizzicato_strings","orchestral_harp","timpani",
  "string_ensemble_1","string_ensemble_2","synth_strings_1","synth_strings_2",
  "choir_aahs","voice_oohs","synth_choir","orchestra_hit",
  "trumpet","trombone","tuba","muted_trumpet",
  "french_horn","brass_section","synth_brass_1","synth_brass_2",
  "soprano_sax","alto_sax","tenor_sax","baritone_sax",
  "oboe","english_horn","bassoon","clarinet",
  "piccolo","flute","recorder","pan_flute",
  "blown_bottle","shakuhachi","whistle","ocarina",
  "lead_1_square","lead_2_sawtooth","lead_3_calliope","lead_4_chiff",
  "lead_5_charang","lead_6_voice","lead_7_fifths","lead_8_bass__lead",
  "pad_1_new_age","pad_2_warm","pad_3_polysynth","pad_4_choir",
  "pad_5_bowed","pad_6_metallic","pad_7_halo","pad_8_sweep",
  "fx_1_rain","fx_2_soundtrack","fx_3_crystal","fx_4_atmosphere",
  "fx_5_brightness","fx_6_goblins","fx_7_echoes","fx_8_scifi",
  "sitar","banjo","shamisen","koto",
  "kalimba","bagpipe","fiddle","shanai",
  "tinkle_bell","agogo","steel_drums","woodblock",
  "taiko_drum","melodic_tom","synth_drum","reverse_cymbal",
  "guitar_fret_noise","breath_noise","seashore","bird_tweet",
  "telephone_ring","helicopter","applause","gunshot"
];

function mInitCh(ch) { if(!mCh[ch]) mCh[ch] = {prg:0, vol:100, expr:127, bend:8192, notes:{}}; }

function parseMidi(buf) {
  const d = new DataView(buf);
  let p = 0;
  const u8=()=>d.getUint8(p++), u16=()=>{const v=d.getUint16(p);p+=2;return v},
        u32=()=>{const v=d.getUint32(p);p+=4;return v};
  const vlq=()=>{let v=0;for(;;){const b=u8();v=(v<<7)|(b&0x7f);if(!(b&0x80))return v;}};
  if(u32()!==0x4d546864)return null;
  u32(); const fmt=u16(),nTrk=u16(),tpq=u16();
  const evts=[];
  for(let t=0;t<nTrk;t++){
    if(u32()!==0x4d54726b){return null;}
    const tLen=u32(); const tEnd=p+tLen; let tick=0, rs=0;
    while(p<tEnd){
      tick+=vlq();
      let st=d.getUint8(p);
      if(st<0x80){st=rs;}else{p++;if(st<0xF0)rs=st;}
      const hi=st&0xf0, ch=st&0x0f;
      if(hi===0x90){const n=u8(),v=u8();evts.push({tick,t:v>0?"on":"off",ch,n,v});}
      else if(hi===0x80){const n=u8();u8();evts.push({tick,t:"off",ch,n,v:0});}
      else if(hi===0xC0){evts.push({tick,t:"pc",ch,prg:u8()});}
      else if(hi===0xB0){const cc=u8(),cv=u8();evts.push({tick,t:"cc",ch,cc,cv});}
      else if(hi===0xE0){const lo=u8(),hi2=u8();evts.push({tick,t:"bend",ch,v:(hi2<<7)|lo});}
      else if(hi===0xD0){u8();}
      else if(hi===0xA0){u8();u8();}
      else if(st===0xFF){
        const mt=u8(),ml=vlq();
        if(mt===0x51&&ml===3){
          const us=(d.getUint8(p)<<16)|(d.getUint8(p+1)<<8)|d.getUint8(p+2);
          evts.push({tick,t:"tempo",us});
        }
        p+=ml;
      }
      else if(st===0xF0||st===0xF7){const sl=vlq();p+=sl;}
      else { p=tEnd; break; }
    }
    p=tEnd;
  }
  evts.sort((a,b)=>a.tick-b.tick);
  let curTempo=500000, lastTick=0, lastMs=0;
  for(const e of evts){
    e.ms = lastMs + (e.tick-lastTick)*(curTempo/tpq)/1000;
    if(e.t==="tempo"){lastMs=e.ms; lastTick=e.tick; curTempo=e.us;}
  }
  return evts;
}

async function mLoadInstrument(prg) {
  if(mInstruments[prg]) return mInstruments[prg];
  if(mLoadingInstruments[prg]) return mLoadingInstruments[prg];
  const name = GM_NAMES[prg] || "acoustic_grand_piano";
  mLoadingInstruments[prg] = Soundfont.instrument(mACtx, name, {
    soundfont: "MusyngKite", gain: 0.6
  }).then(inst => {
    mInstruments[prg] = inst;
    delete mLoadingInstruments[prg];
    return inst;
  }).catch(e => {
    console.warn("Failed to load instrument:", name, e);
    delete mLoadingInstruments[prg];
    return null;
  });
  return mLoadingInstruments[prg];
}

function mChGain(ch) {
  mInitCh(ch);
  return (mCh[ch].vol / 127) * (mCh[ch].expr / 127);
}

function mApplyBend(ch) {
  mInitCh(ch);
  const bend = (mCh[ch].bend - 8192) / 8192; // -1 to +1, ±2 semitones
  const detune = bend * 200; // cents
  for(const n in mCh[ch].notes){
    const node = mCh[ch].notes[n];
    if(node && node.source && node.source.detune) {
      try { node.source.detune.value = detune; } catch(e) {}
    }
  }
}

function mNoteOn(ch, note, vel) {
  if(!mACtx||!mGain) return;
  mNoteOff(ch, note);
  mInitCh(ch);
  if(ch === 9) return; // percussion channel
  const prg = mCh[ch].prg || 0;
  const inst = mInstruments[prg];
  if(!inst) return;
  const g = mChGain(ch) * (vel/127) * 0.8;
  const node = inst.play(note, mACtx.currentTime, {gain: g});
  if(node) {
    node.connect(mGain);
    mCh[ch].notes[note] = node;
  }
}

function mNoteOff(ch, note) {
  if(!mCh[ch] || !mCh[ch].notes[note]) return;
  try { mCh[ch].notes[note].stop(); } catch(e) {}
  delete mCh[ch].notes[note];
}

function mStopAll() {
  for(let c=0;c<16;c++){
    if(!mCh[c]) continue;
    for(const n in mCh[c].notes){
      try { mCh[c].notes[n].stop(); } catch(e) {}
    }
  }
  mCh = new Array(16).fill(null);
}

function mTick() {
  if(!musicPlaying || !mEvents.length) return;
  const now = performance.now() - mStartTime;
  while(mEvIdx < mEvents.length && mEvents[mEvIdx].ms <= now){
    const e = mEvents[mEvIdx++];
    if(e.t === "on") mNoteOn(e.ch, e.n, e.v);
    else if(e.t === "off") mNoteOff(e.ch, e.n);
    else if(e.t === "pc"){
      mInitCh(e.ch);
      mCh[e.ch].prg = e.prg;
      mLoadInstrument(e.prg);
    }
    else if(e.t === "cc"){
      mInitCh(e.ch);
      if(e.cc === 7) mCh[e.ch].vol = e.cv;       // volume
      else if(e.cc === 11) mCh[e.ch].expr = e.cv; // expression
    }
    else if(e.t === "bend"){
      mInitCh(e.ch);
      mCh[e.ch].bend = e.v;
      mApplyBend(e.ch);
    }
  }
  if(mEvIdx >= mEvents.length){
    musicStop();
    mNextSongTimeout = setTimeout(musicPlayNext, 500);
  }
}

function loadMidiXHR(url, callback) {
  const xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.responseType = "arraybuffer";
  xhr.onload = function() { if(xhr.status===0||xhr.status===200) callback(xhr.response); else callback(null); };
  xhr.onerror = function() { callback(null); };
  xhr.send();
}

async function midiPlayFile(num) {
  if(!mACtx){
    mACtx = new (window.AudioContext || window.webkitAudioContext)();
    mGain = mACtx.createGain();
    mGain.gain.value = 0.5;
    mGain.connect(mACtx.destination);
  }
  if(mACtx.state === "suspended") await mACtx.resume();
  mStopAll();

  loadMidiXHR("assets/music/music"+num+".mid", async function(buf) {
    if(!buf){ console.warn("Failed to load music"+num+".mid"); return; }
    const evts = parseMidi(buf);
    if(!evts || !evts.length){ console.warn("MIDI parse failed for music"+num); return; }
    console.log("MIDI loaded: music"+num+".mid, "+evts.length+" events, ~"+Math.round(evts[evts.length-1].ms/1000)+"s");

    const progs = new Set();
    for(const e of evts) { if(e.t === "pc") progs.add(e.prg); }
    if(progs.size === 0) progs.add(0);
    console.log("Loading instruments:", [...progs].map(p => GM_NAMES[p]));
    await Promise.all([...progs].map(p => mLoadInstrument(p)));

    mEvents = evts; mEvIdx = 0; mStartTime = performance.now();
    if(mInterval) clearInterval(mInterval);
    mInterval = setInterval(mTick, 16);
    musicPlaying = true;
  });
}

function musicInit(){}
function musicPlayNext(){
  if(!musicOn) return;
  currentSong = (currentSong % MUSIC_COUNT) + 1;
  midiPlayFile(currentSong);
}
function musicPlay(){ musicPlayNext(); }
function musicStop(){
  if(mInterval){ clearInterval(mInterval); mInterval = null; }
  if(mNextSongTimeout){ clearTimeout(mNextSongTimeout); mNextSongTimeout = null; }
  mStopAll(); musicPlaying = false;
}
function musicToggle(){ if(musicPlaying) musicStop(); else musicPlay(); }

}

function drawText(fontKey, text, x, y) {
  const f = FONTS[fontKey];
  if (!f) return 0;
  const img = images[f.img];
  if (!img || !img.complete) return 0;
  let cx = x;
  for (let i = 0; i < text.length; i++) {
    const code = text.charCodeAt(i) - 32;
    if (code < 0 || code >= 91) { cx += f.widths[0]; continue; }
    const w = f.widths[code] !== undefined ? f.widths[code] : f.widths[0];
    ctx.drawImage(img, 0, code * f.cellH, f.cellW, f.cellH, Math.round(cx), Math.round(y), f.cellW, f.cellH);
    cx += w + 1;
  }
  return cx - x;
}

function measureText(fontKey, text) {
  const f = FONTS[fontKey];
  if (!f) return 0;
  let w = 0;
  for (let i = 0; i < text.length; i++) {
    const code = text.charCodeAt(i) - 32;
    if (code < 0 || code >= 91) { w += f.widths[0] + 1; continue; }
    w += (f.widths[code] !== undefined ? f.widths[code] : f.widths[0]) + 1;
  }
  return Math.max(0, w - 1);
}

// ============================================================
// COORDINATE MAPPING
// ============================================================
function marbleX(col) {
  if (col === 0) return 68;
  if (col === 15) return 546;
  return 30 * col + 82;
}
function marbleY(row) {
  if (row === 0) return 21;
  if (row === 15) return 327;
  return 20 * row + 24;
}

function screenToBoard(sx, sy) {
  // Match original C++ hit detection from GameGetInput()
  let col = -1, row = -1;
  // X-axis
  if (sx < 571 && sx > 545) col = 15;
  else if (sx > 106 && sx < 527) col = Math.floor((sx - 78) / 30);
  else if (sx > 68 && sx < 93) col = 0;
  // Y-axis
  if (sy < 340 && sy > 16) {
    if (sy > 322) row = 15;
    else if (sy > 36) row = Math.floor((sy - 16) / 20);
    else row = 0;
  }
  // Validate col range
  if (col < 0 || col > 15) col = -1;
  if (row < 0 || row > 15) row = -1;
  return { col, row };
}

// ============================================================
// BOARD LOGIC
// ============================================================
function isCorner(c, r) {
  return (c < 3 && r < 3) || (c > 12 && r < 3) || (c < 3 && r > 12) || (c > 12 && r > 12);
}
function isEdge(c, r) {
  return c === 0 || c === 15 || r === 0 || r === 15;
}
function isTeammate(p1, p2) {
  if (p1 === p2) return true;
  if (!players[p1] || !players[p2]) return false;
  return players[p1].team > 0 && players[p1].team === players[p2].team;
}

function initBoard() {
  gBoard = [];
  for (let c = 0; c < 16; c++) {
    gBoard[c] = [];
    for (let r = 0; r < 16; r++) {
      gBoard[c][r] = CELL_SPACE;
    }
  }
  // Corners invalid
  for (let c = 0; c < 3; c++) for (let r = 0; r < 3; r++) gBoard[c][r] = CELL_INVALID;
  for (let c = 13; c < 16; c++) for (let r = 0; r < 3; r++) gBoard[c][r] = CELL_INVALID;
  for (let c = 0; c < 3; c++) for (let r = 13; r < 16; r++) gBoard[c][r] = CELL_INVALID;
  for (let c = 13; c < 16; c++) for (let r = 13; r < 16; r++) gBoard[c][r] = CELL_INVALID;

  // Place player marbles
  for (let i = 0; i < 4; i++) {
    if (!players[i] || !players[i].active) continue;
    players[i].eliminated = false;
    if (i === 0) for (let c = 3; c <= 12; c++) gBoard[c][0] = 0;
    if (i === 1) for (let r = 3; r <= 12; r++) gBoard[15][r] = 1;
    if (i === 2) for (let c = 3; c <= 12; c++) gBoard[c][15] = 2;
    if (i === 3) for (let r = 3; r <= 12; r++) gBoard[0][r] = 3;
  }

  // Sinkholes
  let placed = 0, attempts = 0;
  while (placed < numSinkholes && attempts < 5000) {
    const c = Math.floor(Math.random() * 14) + 1;
    const r = Math.floor(Math.random() * 14) + 1;
    if (gBoard[c][r] === CELL_SPACE && !isCorner(c, r)) {
      gBoard[c][r] = CELL_SINK;
      placed++;
    }
    attempts++;
  }
}

function countPlayerMarbles(p) {
  let n = 0;
  for (let c = 0; c < 16; c++)
    for (let r = 0; r < 16; r++)
      if (gBoard[c][r] === p) n++;
  return n;
}

function getValidMoves(col, row, dieValue) {
  const moves = [];
  const owner = gBoard[col][row];
  if (owner < 0 || owner > 3) return moves;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (const [dc, dr] of dirs) {
    const nc = col + dc * dieValue;
    const nr = row + dr * dieValue;
    if (nc < 1 || nc > 14 || nr < 1 || nr > 14) continue;
    if (isCorner(nc, nr)) continue;
    const dest = gBoard[nc][nr];
    if (dest !== CELL_SPACE && dest !== CELL_FREE && dest !== CELL_SINK) continue;

    let blocked = false;
    const enemies = [];
    for (let step = 1; step < dieValue; step++) {
      const sc = col + dc * step;
      const sr = row + dr * step;
      if (sc < 0 || sc > 15 || sr < 0 || sr > 15) { blocked = true; break; }
      const cell = gBoard[sc][sr];
      if (cell >= 0 && cell <= 3) {
        if (isTeammate(owner, cell)) continue;
        if (!isEdge(sc, sr)) {
          enemies.push({ col: sc, row: sr, player: cell });
        }
      }
    }
    if (blocked) continue;
    moves.push({ col: nc, row: nr, enemies, destType: dest });
  }
  return moves;
}

function findFreeEdgeSpot(player) {
  const spots = [];
  if (player === 0) for (let c = 3; c <= 12; c++) { if (gBoard[c][0] === CELL_SPACE) spots.push({c, r:0}); }
  if (player === 1) for (let r = 3; r <= 12; r++) { if (gBoard[15][r] === CELL_SPACE) spots.push({c:15, r}); }
  if (player === 2) for (let c = 3; c <= 12; c++) { if (gBoard[c][15] === CELL_SPACE) spots.push({c, r:15}); }
  if (player === 3) for (let r = 3; r <= 12; r++) { if (gBoard[0][r] === CELL_SPACE) spots.push({c:0, r}); }
  return spots.length > 0 ? spots[Math.floor(Math.random() * spots.length)] : null;
}

// Offscreen canvas for free marble "F" sprite with palette glow
let freeMarbleCanvas = null;
let freeMarbleCtx = null;
let freeMarbleBaseData = null; // original pixel data
const GLOW_COLOR = [0, 255, 0]; // green pixels in PNG = palette index 88

function initFreeMarbleSprite() {
  if (!images.items || !images.items.complete) return;
  freeMarbleCanvas = document.createElement("canvas");
  freeMarbleCanvas.width = 11; freeMarbleCanvas.height = 13;
  freeMarbleCtx = freeMarbleCanvas.getContext("2d");
  freeMarbleCtx.drawImage(images.items, 51, 40, 11, 13, 0, 0, 11, 13);
  freeMarbleBaseData = freeMarbleCtx.getImageData(0, 0, 11, 13);
}

function drawFreeMarbleSprite(col, row) {
  if (!freeMarbleCanvas) initFreeMarbleSprite();
  if (!freeMarbleCanvas) return;

  // Calculate glow color (same as original: palette animation on CLR_FREEBORDER)
  const gv = glowFrame > 25 ? 50 - glowFrame : glowFrame;
  const gr = Math.round(gv);
  const gg = Math.min(255, Math.round(7 * gv));
  const gb = Math.min(255, Math.round(10 * gv));

  // Recolor green pixels to glow color
  const imgData = freeMarbleCtx.createImageData(11, 13);
  const src = freeMarbleBaseData.data;
  const dst = imgData.data;
  for (let i = 0; i < src.length; i += 4) {
    if (src[i] === GLOW_COLOR[0] && src[i+1] === GLOW_COLOR[1] && src[i+2] === GLOW_COLOR[2] && src[i+3] > 0) {
      dst[i] = gr; dst[i+1] = gg; dst[i+2] = gb; dst[i+3] = 255;
    } else {
      dst[i] = src[i]; dst[i+1] = src[i+1]; dst[i+2] = src[i+2]; dst[i+3] = src[i+3];
    }
  }
  freeMarbleCtx.putImageData(imgData, 0, 0);

  ctx.drawImage(freeMarbleCanvas, marbleX(col) + 8, marbleY(row) - 5);
}

function drawSinkholeSprite(col, row) {

function drawAllBoardPieces() {
  // Draw sinkholes first (under everything)
  for (let c = 0; c < 16; c++)
    for (let r = 0; r < 16; r++)
      if (gBoard[c][r] === CELL_SINK) drawSinkholeSprite(c, r);
  // Free marbles (drawn after sinkholes, above highlights)
  for (let c = 0; c < 16; c++)
    for (let r = 0; r < 16; r++)
      if (gBoard[c][r] === CELL_FREE) drawFreeMarbleSprite(c, r);
  // Player marbles
  for (let c = 0; c < 16; c++)
    for (let r = 0; r < 16; r++)
      if (gBoard[c][r] >= 0 && gBoard[c][r] <= 3) drawMarbleSprite(c, r, gBoard[c][r]);
}

function drawDice() {
  if (!images.dice || !images.dice.complete) return;
  const faceW = 26, faceH = 27;

    if (!diceVisible[d]) continue;
    const val = (gameState === ST_ROLL_DICE && diceAnimTimer < 400)
      ? diceAnimValues[d] : dice[d];
    if (val < 1) continue;
    const dx = 291 + d * 32, dy = Math.round(diceSlideY[d]);
    if (dy >= 480) continue; // offscreen
    // Clip to game area
    ctx.save();
    ctx.beginPath();
    ctx.rect(dx, 0, faceW, 480);
    ctx.clip();
    ctx.drawImage(images.dice, faceW * SPRITE_IDX[currentPlayer], 26 * (val - 1), faceW, faceH, dx, dy, faceW, faceH);
    if (diceUsed[d] && gameState !== ST_ROLL_DICE && gameState !== ST_HIDE_DICE) {
      if (images.items && images.items.complete) {
        ctx.drawImage(images.items, 35, 56, 16, 17, dx + 5, dy + 5, 16, 17);
      }

    ctx.restore();

}

function drawPlayerBars() {
  // Original offline layout: 251x44 bars, paired left/right
  const barW = 251, barH = 44;
  const actives = [];
  for (let i = 0; i < 4; i++) if (players[i] && players[i].active) actives.push(i);
  const n = actives.length;

  for (let idx = 0; idx < n; idx++) {
    const i = actives[idx];
    // Position: even idx=left(17), odd idx=right(372)
    const isRight = idx % 2 === 1;
    const px = isRight ? 372 : 17;
    let py;
    if (n <= 2) py = 400;
    else py = idx < 2 ? 372 : 425;
    const isCurrent = (i === currentPlayer);

    // Black background + light grey fill
    ctx.fillStyle = CLR_BLACK;
    ctx.fillRect(px, py, barW, barH);
    ctx.fillStyle = CLR_LGREY;
    ctx.fillRect(px + 1, py + 1, barW - 2, barH - 2);
    // White inner border
    ctx.strokeStyle = CLR_WHITE;
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 1.5, py + 1.5, barW - 3, barH - 3);

    // Player name
    drawText("small", players[i].name, px + 5, py + 4);

    if (players[i].eliminated) {
      drawText("small", "ELIMINATED", px + 5, py + 18);
    } else {
      // Marble count graph bar
      const mc = countPlayerMarbles(i);
      const graphX = px + 5, graphY = py + 16, graphW = barW - 10, graphH = 12;
      const fillW = Math.round(graphW * mc / 10);
      // Graph border and fill
      ctx.fillStyle = CLR_GRAPHFILL;
      ctx.fillRect(graphX, graphY, graphW, graphH);
      ctx.fillStyle = CLRS_MED[i];
      ctx.fillRect(graphX, graphY, fillW, graphH);
      // 3D border shading
      ctx.strokeStyle = CLRS_BLK[i];
      ctx.lineWidth = 1;
      ctx.strokeRect(graphX + 0.5, graphY + 0.5, graphW - 1, graphH - 1);

      // Games won markers
      for (let g = 0; g < gamesWon[i]; g++) {
        ctx.fillStyle = CLRS_DRK[i];
        ctx.fillRect(graphX + g * 7, py + 32, 5, 8);
      }
    }

    // Current player highlight: double border in player color
    if (isCurrent && !players[i].eliminated) {
      ctx.strokeStyle = CLRS_MED[i];
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 0.5, py + 0.5, barW - 1, barH - 1);
    }
  }
}

function handleMenuClick(mx, my) {

  if (helpOpen) {

  if (mx >= 609 && mx < 631 && my >= 9 && my < 21) {

  // Button clicks
  if (Math.round(menuY) !== 22) return false;
  for (let i = 0; i < MENU_COUNT; i++) {
    const bx = 610, bby = menuBtnScreenY(i);
    if (mx >= bx && mx < bx + 20 && my >= bby && my < bby + 20) {
      onMenuButton(i);
      return true;
    }
  }
  return false;
}

function updateMenuHover() {
  menuHover = -1;
  if (Math.round(menuY) !== 22) return;
  for (let i = 0; i < MENU_COUNT; i++) {
    const bx = 610, bby = menuBtnScreenY(i);
    if (mouseX >= bx && mouseX < bx + 20 && mouseY >= bby && mouseY < bby + 20) {
      menuHover = i;
      break;
    }
  }
}

function onMenuButton(idx) {
  switch (MENU_BTNS[idx].action) {

      break;
    case "help":
      helpOpen = true;

    case "music":
      musicOn = !musicOn;
      if (musicOn) { if (!musicPlaying) musicPlay(); }
      else musicStop();
      break;
    case "sound":
      soundOn = !soundOn;
      break;
  }
}

// ============================================================
// ARC TRAJECTORY
// ============================================================
function arcPos(sx, sy, ex, ey, t) {
  const x = sx + (ex - sx) * t;
  const ly = sy + (ey - sy) * t;
  const arc = -100 * t * (1 - t);
  return { x, y: ly + arc };
}

// ============================================================
// AI
// ============================================================
function countDanger(col, row, player) {
  if (isEdge(col, row)) return 0;
  let danger = 0;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (const [dc, dr] of dirs) {
    for (let dist = 1; dist <= 14; dist++) {
      const ec = col - dc * dist, er = row - dr * dist;
      if (ec < 0 || ec > 15 || er < 0 || er > 15) break;
      const cell = gBoard[ec][er];
      if (cell >= 0 && cell <= 3) {
        if (!isTeammate(player, cell)) danger++;
        break;
      }
    }
  }
  return danger;
}

function aiPickMove() {
  const p = currentPlayer;
  let bestScore = -Infinity;
  let bestMove = null, bestDie = -1;

  for (let d = 0; d < 2; d++) {
    if (diceUsed[d]) continue;
    for (let c = 0; c < 16; c++) {
      for (let r = 0; r < 16; r++) {
        if (gBoard[c][r] !== p) continue;
        const moves = getValidMoves(c, r, dice[d]);
        for (const m of moves) {
          let score = Math.random() * 2;
          if (m.enemies.length > 0) score += 50 * m.enemies.length;
          if (m.destType === CELL_FREE) score += 30;
          if (m.destType === CELL_SINK) score -= 80;
          if (isEdge(c, r) && !isEdge(m.col, m.row)) score += 10;
          score -= (Math.abs(m.col - 7.5) + Math.abs(m.row - 7.5)) * 0.3;
          score -= countDanger(m.col, m.row, p) * 5;
          score += countDanger(c, r, p) * 3;
          if (score > bestScore) {
            bestScore = score;
            bestMove = { fromCol: c, fromRow: r, toCol: m.col, toRow: m.row, enemies: m.enemies, destType: m.destType };
            bestDie = d;
          }
        }
      }
    }
  }
  return { move: bestMove, die: bestDie };
}

// ============================================================
// GAME FLOW
// ============================================================
function startSplash() {
  gameState = ST_SPLASH;
  stateTimer = 0;
  splashAlpha = 1;
}

function showNewGameDialog() {
  gameState = ST_DIALOG;
  document.getElementById("dialogOverlay").classList.add("active");
}

function startGame() {
  document.getElementById("dialogOverlay").classList.remove("active");
  players = [];
  let activeCount = 0;
  for (let i = 0; i < 4; i++) {
    const name = document.getElementById("pName" + i).value || PLAYER_NAMES_DEFAULT[i];
    const type = document.getElementById("pType" + i).value;
    const team = parseInt(document.getElementById("pTeam" + i).value) || 0;
    const active = type !== "off";
    players.push({ name, type, team, active, eliminated: false });
    if (active) activeCount++;
  }
  if (activeCount < 2) {
    players[0].active = true; players[0].type = "human";
    players[1].active = true; players[1].type = "computer";
  }
  numSinkholes = Math.max(0, Math.min(75, parseInt(document.getElementById("sinkCount").value) || 25));
  numGames = Math.max(1, Math.min(5, parseInt(document.getElementById("gameCount").value) || 1));
  currentGame = 0;
  gamesWon = [0,0,0,0];
  // Start music on first user interaction
  if (!musicPlaying) { musicInit(); musicPlay(); }
  startRound();
}

function startRound() {
  initBoard();
  const ap = players.map((p,i) => i).filter(i => players[i].active);
  currentPlayer = ap[Math.floor(Math.random() * ap.length)];
  gameState = ST_MARBLES_SHOW;
  showMarblesProgress = 0;
}

function rollDice() {
  dice[0] = Math.floor(Math.random() * 6) + 1;
  dice[1] = Math.floor(Math.random() * 6) + 1;
  diceUsed = [false, false];
  selectedMarble = null;
  validMoves = [];
  gameState = ST_ROLL_DICE;
  diceAnimTimer = 0;
  // Slide dice in from below, one at a time
  diceSlideY = [480, 480];
  diceTargetY = [410, 410];
  diceVisible = [true, false]; // first die starts sliding immediately
}

function checkPlayerHasMoves(p) {
  for (let d = 0; d < 2; d++) {
    if (diceUsed[d]) continue;
    for (let c = 0; c < 16; c++)
      for (let r = 0; r < 16; r++) {
        if (gBoard[c][r] !== p) continue;
        if (getValidMoves(c, r, dice[d]).length > 0) return true;
      }
  }
  return false;
}

function nextDieOrPlayer() {
  selectedMarble = null;
  validMoves = [];

  if ((!diceUsed[0] || !diceUsed[1]) && checkPlayerHasMoves(currentPlayer)) {
    if (players[currentPlayer].type === "computer") {
      gameState = ST_AI_THINK;
      stateTimer = 0;
    } else {
      gameState = ST_GET_INPUT;
    }
    return;
  }
  // Hide dice before advancing
  gameState = ST_HIDE_DICE;
  diceTargetY = [480, 480]; // slide out
  return;
}

function advancePlayer() {
  // Check eliminations
  for (let i = 0; i < 4; i++) {
    if (players[i].active && !players[i].eliminated && countPlayerMarbles(i) === 0) {
      players[i].eliminated = true;
    }
  }
  // Check win
  const alive = [];
  for (let i = 0; i < 4; i++)
    if (players[i].active && !players[i].eliminated) alive.push(i);

  if (alive.length <= 1) {
    endRound(alive.length === 1 ? alive[0] : -1);
    return;
  }
  // Same team?
  if (alive.length > 1 && alive.every(i => players[i].team > 0 && players[i].team === players[alive[0]].team)) {
    endRound(alive[0]);
    return;
  }
  // Next player
  let next = currentPlayer;
  for (let a = 0; a < 4; a++) {
    next = (next + 1) % 4;
    if (players[next].active && !players[next].eliminated) break;
  }
  currentPlayer = next;
  rollDice();
}

function endRound(winner) {
  if (winner >= 0) gamesWon[winner]++;
  currentGame++;
  if (currentGame >= numGames) {
    gameState = ST_GAME_OVER;
    const wn = winner >= 0 ? players[winner].name : "Nobody";
    document.getElementById("winnerText").textContent = wn + " wins!";
    document.getElementById("gameOverOverlay").classList.add("active");
  } else {
    startRound();
  }
}

function executeMove(fromCol, fromRow, toCol, toRow, enemies, destType, dieIdx) {
  diceUsed[dieIdx] = true;
  animPlayer = gBoard[fromCol][fromRow];
  moveFromCol = fromCol; moveFromRow = fromRow;
  moveToCol = toCol; moveToRow = toRow;
  moveEnemies = enemies || [];
  moveEnemyIdx = 0;
  moveDestType = destType;
  animProgress = 0;

  // Remove marble from source
  gBoard[fromCol][fromRow] = CELL_SPACE;

  if (moveEnemies.length > 0) {
    // Bullet from source to first enemy
    gameState = ST_BULLET_MOVE;
    const e = moveEnemies[0];
    animSrcX = marbleX(fromCol) + 10; animSrcY = marbleY(fromRow) - 8;
    animDstX = marbleX(e.col) + 10; animDstY = marbleY(e.row) - 8;
  } else {
    // Flying marble (offset +2, -5 like original)
    gameState = ST_MARBLE_MOVE;
    animSrcX = marbleX(fromCol) + 2; animSrcY = marbleY(fromRow) - 5;
    animDstX = marbleX(toCol) + 2; animDstY = marbleY(toRow) - 5;
  }
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  // Hole anim: VEL_MOVE=0.05, clamped to 8 (plays once, not looping)
  holeAnimFrame = Math.min(holeAnimFrame + dt * 0.05, 8);
  // Selection ring: VEL_SELECTRING=0.05, wraps at 24
  selectAnimFrame += dt * 0.05;
  if (selectAnimFrame >= 24) selectAnimFrame = 0;
  // Free marble glow: VEL_GLOW=0.05, cycles 0→50
  glowFrame += dt * 0.05;
  if (glowFrame > 50) glowFrame = 0;
  // Dice slide animation
  for (let d = 0; d < 2; d++) {
    if (diceSlideY[d] !== diceTargetY[d]) {
      const dir = diceTargetY[d] < diceSlideY[d] ? -1 : 1;
      diceSlideY[d] += dir * dt * 0.2;
      if ((dir < 0 && diceSlideY[d] <= diceTargetY[d]) ||
          (dir > 0 && diceSlideY[d] >= diceTargetY[d])) {
        diceSlideY[d] = diceTargetY[d];
      }
    }
  }

  // Menu hover
  updateMenuHover();

  // Menu bar slide
  if (menuY !== menuTargetY) {
    const dir = menuTargetY < menuY ? -1 : 1;
    menuY += dir * dt * 0.5;
    if ((dir < 0 && menuY <= menuTargetY) || (dir > 0 && menuY >= menuTargetY)) menuY = menuTargetY;
  }

  switch (gameState) {
    case ST_SPLASH:
      stateTimer += dt;
      if (stateTimer > 3000) {
        splashAlpha = Math.max(0, 1 - (stateTimer - 3000) / 1000);
        if (stateTimer > 4000) showNewGameDialog();
      }
      break;

    case ST_MARBLES_SHOW:
      showMarblesProgress = Math.min(1, showMarblesProgress + dt * 0.002);
      if (showMarblesProgress >= 1) { gameState = ST_SHOW_BARS; barsProgress = 0; }
      break;

    case ST_SHOW_BARS:
      barsProgress = Math.min(1, barsProgress + dt * 0.003);
      if (barsProgress >= 1) rollDice();
      break;

    case ST_ROLL_DICE:
      diceAnimTimer += dt;
      // Start second die sliding once first arrives
      if (!diceVisible[1] && diceSlideY[0] <= diceTargetY[0] + 5) {
        diceVisible[1] = true;
      }
      // Animate random dice values while sliding
      if (diceAnimTimer < 400) {
        if (Math.random() < dt * 0.03) {
          diceAnimValues[0] = Math.floor(Math.random() * 6) + 1;
          diceAnimValues[1] = Math.floor(Math.random() * 6) + 1;
        }
      }
      // Both dice arrived and settled
      if (diceAnimTimer > 500 && diceSlideY[0] <= diceTargetY[0] && diceSlideY[1] <= diceTargetY[1]) {
        if (!checkPlayerHasMoves(currentPlayer)) {
          playSound("cant");
          diceUsed = [true, true];
          // Hide dice then advance
          gameState = ST_HIDE_DICE;
          diceTargetY = [480, 480];
        } else if (players[currentPlayer].type === "computer") {
          gameState = ST_AI_THINK;
          stateTimer = 0;
        } else {
          gameState = ST_GET_INPUT;
          holeAnimFrame = 0;
        }
      }
      break;

    case ST_HIDE_DICE:
      // Wait for both dice to slide off screen
      if (diceSlideY[0] >= 480 && diceSlideY[1] >= 480) {
        diceVisible = [false, false];
        advancePlayer();
      }
      break;

    case ST_AI_THINK:
      stateTimer += dt;
      if (stateTimer > 350) {
        const { move, die } = aiPickMove();
        if (move) {
          executeMove(move.fromCol, move.fromRow, move.toCol, move.toRow, move.enemies, move.destType, die);
        } else {
          // Mark remaining dice used
          diceUsed[0] = true; diceUsed[1] = true;
          nextDieOrPlayer();
        }
      }
      break;

    case ST_BULLET_MOVE:
      animProgress = Math.min(1, animProgress + dt * 0.004);
      if (animProgress >= 1) {
        // Current enemy explodes
        const curEnemy = moveEnemies[moveEnemyIdx];
        explodeX = marbleX(curEnemy.col);
        explodeY = marbleY(curEnemy.row);
        explodePlayer = curEnemy.player;
        explodeFrame = 0;
        gBoard[curEnemy.col][curEnemy.row] = CELL_FREE;
        gameState = ST_MARBLE_EXPLODE;
        playSound("explode");
      }
      break;

    case ST_MARBLE_EXPLODE:
      explodeFrame += dt * 0.02;
      if (explodeFrame >= 12) {
        moveEnemyIdx++;
        if (moveEnemyIdx < moveEnemies.length) {
          // More enemies to shoot — fire next bullet
          const prev = moveEnemies[moveEnemyIdx - 1];
          const next = moveEnemies[moveEnemyIdx];
          gameState = ST_BULLET_MOVE;
          animProgress = 0;
          animSrcX = marbleX(prev.col) + 10; animSrcY = marbleY(prev.row) - 8;
          animDstX = marbleX(next.col) + 10; animDstY = marbleY(next.row) - 8;
        } else {
          // All enemies shot — now move marble from source to destination
          gameState = ST_MARBLE_MOVE;
          animProgress = 0;
          animSrcX = marbleX(moveFromCol) + 2; animSrcY = marbleY(moveFromRow) - 5;
          animDstX = marbleX(moveToCol) + 2; animDstY = marbleY(moveToRow) - 5;
        }
      }
      break;

    case ST_MARBLE_MOVE:
      animProgress = Math.min(1, animProgress + dt * 0.003);
      if (animProgress >= 1) {
        if (moveDestType === CELL_SINK) {
          gameState = ST_SINK_LOSE;
          sinkFrame = 20;
          sinkSoundPlayed = false;
          gBoard[moveToCol][moveToRow] = CELL_SINK; // keep sinkhole
        } else if (moveDestType === CELL_FREE) {
          gBoard[moveToCol][moveToRow] = animPlayer;
          freeMarbleEdgePos = findFreeEdgeSpot(animPlayer);
          if (freeMarbleEdgePos) {
            // Don't place marble on board yet — wait for rise animation to finish
            gameState = ST_FREE_GAIN;
            riseFrame = 0;
            playSound("free");
          } else {
            playSound("cant");
            nextDieOrPlayer();
          }
        } else {
          gBoard[moveToCol][moveToRow] = animPlayer;
          nextDieOrPlayer();
        }
      }
      break;

    case ST_FREE_GAIN:
      // Original: gFrame 0→20+ at VEL_SHOWMARBLE=0.03, rise sound at completion
      riseFrame += dt * 0.03;
      if (riseFrame > 20) {
        // Now place the marble on the board
        gBoard[freeMarbleEdgePos.c][freeMarbleEdgePos.r] = animPlayer;
        playSound("show");
        nextDieOrPlayer();
      }
      break;

    case ST_SINK_LOSE:
      // Original: gFrame starts at 20, vel=-0.03, sound at frame<6, done at frame<0
      sinkFrame -= dt * 0.03;
      if (sinkFrame < 6 && !sinkSoundPlayed) {
        playSound("sink");
        sinkSoundPlayed = true;
      }
      if (sinkFrame < 0) {
        gBoard[moveToCol][moveToRow] = CELL_SPACE; // sinkhole consumed
        nextDieOrPlayer();
      }
      break;
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.clearRect(0, 0, INTERNAL_W, INTERNAL_H);

  if (gameState === ST_LOADING) {
    ctx.fillStyle = CLR_BKGND;
    ctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);
    ctx.fillStyle = "#000";
    ctx.font = "14px monospace";
    ctx.textAlign = "center";
    ctx.fillText("Loading assets...", INTERNAL_W / 2, INTERNAL_H / 2);
    ctx.textAlign = "left";
    return;
  }

  if (gameState === ST_SPLASH) {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);
    if (images.splash && images.splash.complete) {
      ctx.globalAlpha = splashAlpha;
      ctx.drawImage(images.splash, 0, 0, INTERNAL_W, INTERNAL_H);
      ctx.globalAlpha = 1;
    }
    // Click to continue hint
    if (stateTimer > 1500) {
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(stateTimer * 0.003);
      ctx.fillStyle = "#fff";
      ctx.font = "12px monospace";
      ctx.textAlign = "center";
      ctx.fillText("Click to continue", INTERNAL_W / 2, INTERNAL_H - 20);
      ctx.textAlign = "left";
      ctx.globalAlpha = 1;
    }
    return;
  }

  if (gameState === ST_DIALOG) {
    drawBoard();
    return;
  }

  // Main game rendering
  drawBoard();

  // Valid move indicators drawn BEFORE marbles (original order: board → highlights → marbles)
  if (gameState === ST_GET_INPUT && validMoves.length > 0) {
    const bp = screenToBoard(mouseX, mouseY);
    for (const m of validMoves) {
      drawValidMoveIndicator(m.col, m.row);
    }
    if (bp.col >= 0) {
      for (const m of validMoves) {
        if (m.col === bp.col && m.row === bp.row) {
          drawHoverHighlight(m.col, m.row);
          break;
        }
      }
    }
  }

  if (gameState === ST_MARBLES_SHOW) {
    ctx.globalAlpha = showMarblesProgress;
    drawAllBoardPieces();
    ctx.globalAlpha = 1;
  } else {
    drawAllBoardPieces();
  }

  // Selection ring
  if (selectedMarble && (gameState === ST_GET_INPUT)) {
    drawSelectionRing(selectedMarble.col, selectedMarble.row);
  }

  // Bullet
  if (gameState === ST_BULLET_MOVE) {
    const t = animProgress;
    const pos = arcPos(animSrcX, animSrcY, animDstX, animDstY, t);
    drawBullet(pos.x, pos.y, animPlayer);
    // Marble waiting at source (draw as normal marble sprite)
    drawMarbleSprite(moveFromCol, moveFromRow, animPlayer);
  }

  // Explosion
  if (gameState === ST_MARBLE_EXPLODE) {
    drawExplosion(explodeX, explodeY, explodePlayer, explodeFrame);
    // Marble still at source
    drawMarbleSprite(moveFromCol, moveFromRow, animPlayer);
  }

  // Flying marble
  if (gameState === ST_MARBLE_MOVE) {
    const t = animProgress;
    const pos = arcPos(animSrcX, animSrcY, animDstX, animDstY, t);
    drawFlyingMarble(pos.x, pos.y, animPlayer);
  }

  // Sink animation (two phases like original GameDrawMarbleSink)
  if (gameState === ST_SINK_LOSE) {
    const sx = marbleX(moveToCol), sy = marbleY(moveToRow);
    if (sinkFrame <= 5) {
      // Phase 1: Hole opening (gFrame 5→0, rows 110+11*frame)
      const hf = Math.max(0, Math.min(4, Math.floor(sinkFrame)));
      if (images.hole && images.hole.complete) {
        ctx.drawImage(images.hole, 0, 11 * hf + 110, 25, 11, sx, sy, 25, 11);
      }
    } else {
      // Phase 2: Marble sinking into hole (gFrame 20→6)
      // Draw hole back
      if (images.hole && images.hole.complete) {
        ctx.drawImage(images.hole, 0, 154, 25, 11, sx, sy, 25, 11);
      }
      // Draw marble clipped to hole area, sinking down
      if (images.marbles && images.marbles.complete) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(sx, sy, 25, 11);
        ctx.clip();
        // Original: y - gFrame + 15; marble sinks as gFrame decreases
        ctx.drawImage(images.marbles, 21 * SPRITE_IDX[animPlayer], 0, 21, 21,
          sx + 2, sy - Math.floor(sinkFrame) + 15, 21, 21);
        ctx.restore();
      }
      // Draw hole front overlay
      if (images.items && images.items.complete) {
        ctx.drawImage(images.items, 10, 65, 25, 5, sx, sy + 6, 25, 5);
      }
    }
  }

  // Free gain: marble rising from hole (like original GameDrawMarbleSink in SHOW mode)
  if (gameState === ST_FREE_GAIN && freeMarbleEdgePos) {
    const rx = marbleX(freeMarbleEdgePos.c), ry = marbleY(freeMarbleEdgePos.r);
    if (riseFrame <= 5) {
      // Phase 1: Hole opening (frames from row 110+)
      const hf = Math.max(0, Math.min(4, Math.floor(riseFrame)));
      if (images.hole && images.hole.complete) {
        ctx.drawImage(images.hole, 0, 11 * hf + 110, 25, 11, rx, ry, 25, 11);
      }
    } else {
      // Phase 2: Marble rising up from hole
      if (images.hole && images.hole.complete) {
        ctx.drawImage(images.hole, 0, 154, 25, 11, rx, ry, 25, 11);
      }
      if (images.marbles && images.marbles.complete) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(rx, ry, 25, 11);
        ctx.clip();
        ctx.drawImage(images.marbles, 21 * SPRITE_IDX[animPlayer], 0, 21, 21,
          rx + 2, ry - Math.floor(riseFrame) + 15, 21, 21);
        ctx.restore();
      }
      // Hole front overlay
      if (images.items && images.items.complete) {
        ctx.drawImage(images.items, 10, 65, 25, 5, rx, ry + 6, 25, 5);
      }
    }
  }

  // UI
  if (gameState >= ST_SHOW_BARS) {
    drawStatusBar();
    drawPlayerBars();
    drawDice();
    drawMenu();
  }

  // Help window overlay (above everything)
  drawHelpWindow();

  // Cursor last
  drawCursor();
}

// ============================================================
// INPUT
// ============================================================
function handleClick(mx, my) {
  if (gameState !== ST_GET_INPUT) return;
  if (players[currentPlayer].type !== "human") return;

  const bp = screenToBoard(mx, my);
  if (bp.col < 0) {
    selectedMarble = null;
    validMoves = [];
    return;
  }

  // Check if clicked valid destination
  if (selectedMarble && validMoves.length > 0) {
    for (const m of validMoves) {
      if (m.col === bp.col && m.row === bp.row) {
        const fromCol = selectedMarble.col, fromRow = selectedMarble.row;
        const dist = Math.abs(m.col - fromCol) + Math.abs(m.row - fromRow);
        // Find matching die
        let dieIdx = -1;
        for (let d = 0; d < 2; d++) {
          if (!diceUsed[d] && dice[d] === dist) { dieIdx = d; break; }
        }
        if (dieIdx < 0) {
          // Shouldn't happen, but fallback
          for (let d = 0; d < 2; d++) { if (!diceUsed[d]) { dieIdx = d; break; } }
        }
        if (dieIdx >= 0) {
          executeMove(fromCol, fromRow, m.col, m.row, m.enemies, m.destType, dieIdx);
        }
        return;
      }
    }
  }

  // Check if clicked own marble
  if (gBoard[bp.col][bp.row] === currentPlayer) {
    selectedMarble = { col: bp.col, row: bp.row };
    validMoves = [];
    for (let d = 0; d < 2; d++) {
      if (diceUsed[d]) continue;
      const mvs = getValidMoves(bp.col, bp.row, dice[d]);
      for (const m of mvs) {
        if (!validMoves.find(v => v.col === m.col && v.row === m.row)) {
          validMoves.push(m);
        }
      }
    }
    if (validMoves.length > 0) { holeAnimFrame = 0; playSound("select"); }
    else playSound("cant");
  } else if (gBoard[bp.col][bp.row] >= 0 && gBoard[bp.col][bp.row] <= 3) {
    // Clicked opponent's marble
    playSound("cant");
    selectedMarble = null;
    validMoves = [];
  } else {
    selectedMarble = null;
    validMoves = [];
  }
}

// ============================================================
// RESIZE
// ============================================================
function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const aspect = INTERNAL_W / INTERNAL_H;
  let w, h;
  if (maxW / maxH > aspect) { h = maxH; w = h * aspect; }
  else { w = maxW; h = w / aspect; }
  w = Math.floor(w); h = Math.floor(h);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  scaleFactor = w / INTERNAL_W;

  const overlay = document.getElementById("dialogOverlay");
  const goOverlay = document.getElementById("gameOverOverlay");
  overlay.style.width = w + "px"; overlay.style.height = h + "px";
  goOverlay.style.width = w + "px"; goOverlay.style.height = h + "px";
}

// ============================================================
// MAIN LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// EVENT LISTENERS
// ============================================================
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / scaleFactor;
  mouseY = (e.clientY - rect.top) / scaleFactor;
});

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / scaleFactor;
  const my = (e.clientY - rect.top) / scaleFactor;

  if (gameState === ST_SPLASH) {
    showNewGameDialog();
    return;
  }
  // Menu takes priority
  if (gameState >= ST_SHOW_BARS && handleMenuClick(mx, my)) return;
  handleClick(mx, my);
});

document.getElementById("btnPlay").addEventListener("click", startGame);
document.getElementById("btnNewGame").addEventListener("click", () => {
  document.getElementById("gameOverOverlay").classList.remove("active");
  showNewGameDialog();
});

window.addEventListener("resize", resize);

// ============================================================
// INIT
// ============================================================
initFonts();
resize();
loadAssets(() => {
  startSplash();
  // Generate favicon from red marble sprite (scale to 32x32)
  try {
    const fc = document.createElement("canvas");
    fc.width = 32; fc.height = 32;
    const fctx = fc.getContext("2d");
    fctx.imageSmoothingEnabled = false;
    fctx.drawImage(images.marbles, 0, 0, 21, 21, 0, 0, 32, 32);
    // Remove any existing favicons
    document.querySelectorAll('link[rel="icon"],link[rel="shortcut icon"]').forEach(el => el.remove());
    const link = document.createElement("link");
    link.rel = "icon"; link.type = "image/png";
    link.href = fc.toDataURL("image/png");
    document.head.appendChild(link);
  } catch(e) { console.warn("Favicon error:", e); }
});
requestAnimationFrame(gameLoop);
</script>
